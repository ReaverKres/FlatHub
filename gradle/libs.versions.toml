compose-multiplatform-backhandler = { module = "org.jetbrains.compose.ui:ui-backhandler", version.ref = "compose-multiplatform-backhandler" }
compose-confetti = { module = "io.github.vinceglb:confettikit", version.ref = "compose-confetti"}
mp-maps = { module = "ovh.plrapps:mapcompose-mp", version.ref = "mapComposeMP"}
kotlin-stdlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlinStdlib" }
datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "dateTimeVer"}
